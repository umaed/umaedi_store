<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembayaran - UMADIGI STORE</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/animation.css">
  <link rel="stylesheet" href="../css/checkout.css">
  <link rel="stylesheet" href="../css/payment.css">
</head>
<body class="payment-body">
  <div id="loader" class="loader"></div>
  <nav id="navbar"></nav>

  <main id="main-content" class="payment-page">
    <section class="payment-hero">
      <span>Pembayaran QRIS</span>
      <h1>Selesaikan pembayaran pesanan.</h1>
      <p>Scan QRIS, upload bukti transfer, lalu kirim detail pesanan ke WhatsApp admin.</p>
    </section>

    <section id="payment-status" class="payment-status"></section>

    <section class="payment-card">
      <div class="payment-timer">
        <span>Sisa waktu pembayaran</span>
        <strong id="payment-timer">10:00</strong>
      </div>

      <div class="qris-frame">
        <img src="../assets/img/qris-umaedi-digital-store.png" alt="QRIS UMAEDI DIGITAL STORE">
      </div>

      <section id="payment-summary" class="payment-summary"></section>

      <label class="proof-uploader">
        <span>Kirim bukti transfer</span>
        <input id="payment-proof" type="file" accept="image/png,image/jpeg,.png,.jpg,.jpeg">
        <small id="proof-file-name">Upload screenshot bukti pembayaran format PNG atau JPG.</small>
      </label>
    </section>

    <section class="order-history-card">
      <div class="summary-title">Riwayat Order</div>
      <div id="order-history" class="order-history"></div>
    </section>
  </main>

  <div class="sticky-order-bar">
    <button id="confirm-payment" class="checkout-main-btn payment-confirm-btn" disabled>Pesan</button>
  </div>

  <footer id="footer"></footer>

  <script defer src="../js/sidebar.js"></script>
  <script defer src="../js/footer.js"></script>
  <script defer src="../js/animation.js"></script>
  <script defer src="../js/theme.js"></script>
  <script defer src="../js/toast.js"></script>
  <script defer src="../js/page-transition.js"></script>
  <script defer src="../js/cart.js"></script>
  <script defer src="../js/payment.js"></script>
</body>
</html>
