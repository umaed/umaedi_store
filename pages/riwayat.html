<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat Order - UMADIGI STORE</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/animation.css">
</head>
<body>
  <div id="loader" class="loader"></div>
  <nav id="navbar"></nav>

  <main id="main-content">
    <section class="home-order-check history-page-panel" aria-label="Riwayat status pesanan">
      <div class="home-order-head">
        <div>
          <p class="eyebrow">Riwayat Order</p>
          <h1 class="page-title">Status pesanan kamu</h1>
        </div>
        <button id="refresh-order-status" type="button">Refresh</button>
      </div>
      <div id="home-order-status" class="home-order-status"></div>
    </section>
  </main>

  <footer id="footer"></footer>

  <script defer src="../js/sidebar.js"></script>
  <script defer src="../js/footer.js"></script>
  <script defer src="../js/animation.js"></script>
  <script defer src="../js/theme.js"></script>
  <script defer src="../js/page-transition.js"></script>
  <script defer src="../js/order-status.js"></script>
</body>
</html>
